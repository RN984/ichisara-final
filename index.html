<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8" />
    <meta name="description" content="千葉県酒々井にあるカフェ　イチサラ（ICHISARA）で贅沢なひととき。元ファーストクラスシェフの絶品グルメを光が差し込む開放的な空間でいただけます。" />
    <title> イチサラ ダイニングヒルズ カフェ｜酒々井の緑あふれるカフェ </title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="48x48">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Shippori+Mincho:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>
    /* 低速モバイル判定 → 軽量版(/lite.html)へ自動遷移。
       Reactバンドルを落とす前に判定する必要があるため head 内で実行。
       いかなる失敗も通常版へフォールバックする安全設計（下の module script は常に残す）。*/
    (function () {
      try {
        var q = new URLSearchParams(location.search);
        if (q.get('full') === '1') return;                      // 通常版を明示指定
        if (q.get('variant')) return;                           // 既存の variant 指定は尊重
        var go = function () { try { location.replace('/lite.html'); } catch (e) {} };

        // Network Information API（Android Chrome 等）: データ節約ON、または 4G未満なら即遷移
        var c = navigator.connection;
        if (c && (c.saveData || (c.effectiveType && c.effectiveType !== '4g'))) return go();

        // iOS Safari 等は上記API非対応 → ping レースで実測判定（600ms以内に返らなければ低速とみなす）
        var done = false;
        var t = setTimeout(function () { if (!done) { done = true; go(); } }, 600);
        fetch('/ping.txt?cb=' + Date.now(), { cache: 'reload' })
          .then(function () { if (!done) { done = true; clearTimeout(t); } })
          .catch(function () { if (!done) { done = true; clearTimeout(t); go(); } });
      } catch (e) { /* 失敗時は通常版で続行 */ }
    })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- 初期ローディング（Reactより前に即表示）。React起動で自動的に置換される。
           読み込みが詰まった人向けに、一定時間後だけ軽量版リンクを出す。 -->
      <div id="boot" style="text-align:center;margin-top:100px;font-family:'Shippori Mincho',serif;color:#555;">
        <div>少々お待ちください…</div>
        <a id="boot-lite" href="/lite.html"
           style="display:none;margin-top:20px;font-size:14px;letter-spacing:0.04em;color:#2f5d43;text-decoration:underline;text-underline-offset:3px;">
          軽くて速い版で見る →
        </a>
      </div>
    </div>
    <script>
      /* 1.8秒待っても React が起動しない＝回線が詰まっている可能性。
         そのときだけ軽量版リンクを表示（速い人には見えない）。
         React起動後は #boot ごと置換されるため getElementById は null になり何もしない。 */
      setTimeout(function () {
        var a = document.getElementById('boot-lite');
        if (a) a.style.display = 'inline-block';
      }, 1800);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
